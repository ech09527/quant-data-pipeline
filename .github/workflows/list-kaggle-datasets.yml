name: List Kaggle Datasets

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: List datasets for authenticated account
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail
          pip install -q kaggle
          echo "=== Auth check ==="
          kaggle config view || true
          echo
          echo "=== My datasets ==="
          kaggle datasets list -m -v
          echo
          echo "=== Dataset count ==="
          kaggle datasets list -m -v | tail -n +2 | wc -l
