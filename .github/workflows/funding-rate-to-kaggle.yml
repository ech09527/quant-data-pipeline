name: Funding Rate to Kaggle

on:
  schedule:
    # Align with bn-data-collect: Binance monthly archives publish on first Monday
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols (empty = all USDT perpetual)"
        required: false
        default: ""
      start_month:
        description: "YYYY-MM start override (empty = per-symbol onboard month)"
        required: false
        default: ""
      end_month:
        description: "YYYY-MM inclusive end (empty = previous complete month)"
        required: false
        default: ""
      publish_to_kaggle:
        description: "Publish merged parquet to Kaggle"
        required: false
        type: boolean
        default: true
      preserve_existing_dataset:
        description: "Keep existing Kaggle files and add/overwrite fundingRate"
        required: false
        type: boolean
        default: true
      check_only:
        description: "Only run network checks (skip download)"
        required: false
        type: boolean
        default: false
      kaggle_dataset:
        description: "Kaggle dataset slug"
        required: false
        type: string
        default: "yhydev97/quant-data"
      version_notes:
        description: "Kaggle version notes"
        required: false
        type: string
        default: "Update Binance UM USDT perpetual fundingRate"
      max_workers:
        description: "Parallel download workers"
        required: false
        type: string
        default: "8"

concurrency:
  group: funding-rate-to-kaggle
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Network check (FAPI & Vision)
        env:
          FAPI_HTTP_PROXY: ${{ secrets.FAPI_HTTP_PROXY }}
          VISION_HTTP_PROXY: ${{ secrets.VISION_HTTP_PROXY }}
        run: uv run check-binance-network

      - name: Stop after network check (check_only=true)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.check_only == 'true' }}
        run: |
          echo "check_only=true -> network checks done, skip collector."

      - name: Download, merge, and publish fundingRate
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.check_only == 'true') }}
        env:
          FAPI_HTTP_PROXY: ${{ secrets.FAPI_HTTP_PROXY }}
          VISION_HTTP_PROXY: ${{ secrets.VISION_HTTP_PROXY }}
          SYMBOLS: ${{ github.event.inputs.symbols || '' }}
          START_MONTH: ${{ github.event.inputs.start_month || '' }}
          END_MONTH: ${{ github.event.inputs.end_month || '' }}
          OUTPUT_PATH: binance/futures/um/fundingRate.parquet
          WORK_DIR: /tmp/funding-rate-work
          MAX_WORKERS: ${{ github.event.inputs.max_workers || '8' }}
          PUBLISH_TO_KAGGLE: ${{ github.event_name != 'workflow_dispatch' && 'true' || (github.event.inputs.publish_to_kaggle != false && 'true' || 'false') }}
          PRESERVE_EXISTING_DATASET: ${{ github.event_name != 'workflow_dispatch' && 'true' || (github.event.inputs.preserve_existing_dataset != false && 'true' || 'false') }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET: ${{ github.event.inputs.kaggle_dataset || 'yhydev97/quant-data' }}
          VERSION_NOTES: ${{ github.event.inputs.version_notes || 'Update Binance UM USDT perpetual fundingRate' }}
          KAGGLE_STAGING_DIR: /tmp/kaggle-staging-funding
          KAGGLE_DIR_MODE: zip
        run: uv run funding-rate-to-kaggle
