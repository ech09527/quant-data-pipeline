name: Lint Pipelines

on:
  push:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile scripts/merge_parquet.py scripts/s3_to_kaggle.py
