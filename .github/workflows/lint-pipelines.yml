name: Lint Pipelines

on:
  push:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Syntax check
        run: |
          uv run python -m py_compile \
            scripts/kaggle_publish.py \
            scripts/s3_client.py \
            scripts/merge_parquet.py \
            scripts/s3_to_kaggle.py \
            scripts/funding_rate_to_kaggle.py \
            scripts/check_binance_network.py
