name: S3 to Kaggle

on:
  workflow_dispatch:
    inputs:
      input_glob:
        description: '输入对象 key 通配符，如 binance/futures/um/klines/1h.parquet'
        required: true
        type: string
        default: 'binance/futures/um/klines/1h.parquet'
      kaggle_dataset:
        description: 'Kaggle 数据集 slug，如 username/my-dataset'
        required: true
        type: string
      version_notes:
        description: 'Kaggle 版本说明'
        required: false
        type: string
        default: 'Uploaded from S3 via quant-data-pipeline'
      create_new:
        description: '是否创建新数据集（默认上传新版本）'
        required: false
        type: boolean
        default: false
      dir_mode:
        description: 'Kaggle 上传打包方式'
        required: false
        type: choice
        options:
          - zip
          - tar
        default: zip

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Transfer S3 data to Kaggle dataset
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_REGION: ${{ secrets.MINIO_REGION }}
          INPUT_BUCKET: ${{ secrets.INPUT_BUCKET }}
          INPUT_GLOB: ${{ github.event.inputs.input_glob }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET: ${{ github.event.inputs.kaggle_dataset }}
          VERSION_NOTES: ${{ github.event.inputs.version_notes }}
          KAGGLE_STAGING_DIR: /tmp/kaggle-staging
        run: |
          ARGS=()
          if [ "${{ github.event.inputs.create_new }}" = "true" ]; then
            ARGS+=(--create-new)
          fi
          python scripts/s3_to_kaggle.py \
            --dir-mode "${{ github.event.inputs.dir_mode }}" \
            "${ARGS[@]}"
