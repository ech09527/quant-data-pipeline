name: Check Kaggle quant-data visibility

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          pip install -q kaggle
          rm -rf /tmp/meta
          mkdir -p /tmp/meta
          kaggle datasets metadata -d yhydev97/quant-data -p /tmp/meta
          cat /tmp/meta/dataset-metadata.json
          echo '--- files ---'
          kaggle datasets files -d yhydev97/quant-data -v
