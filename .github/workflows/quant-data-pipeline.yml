name: Quant Data Pipeline

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/quant-data-pipeline.yml'
      - 'scripts/**'
      - 'requirements.txt'
  schedule:
    # Every Monday 03:30 UTC, aligned with funding-rate pipeline
    - cron: '30 3 * * 1'
  workflow_dispatch:
    inputs:
      symbols:
        description: '交易对列表(逗号分隔，留空=全部USDT永续)'
        required: false
        type: string
        default: ''
      interval:
        description: 'K线周期'
        required: false
        type: choice
        options:
          - 1h
          - 4h
          - 1d
        default: '1h'
      start_month:
        description: '起始月份 YYYY-MM(留空=按交易对上线时间)'
        required: false
        type: string
        default: ''
      end_month:
        description: '结束月份 YYYY-MM(留空=上一个完整月)'
        required: false
        type: string
        default: ''
      max_workers:
        description: '下载并发数'
        required: false
        type: string
        default: '8'
      skip_existing:
        description: '跳过已存在的Parquet文件'
        required: false
        type: boolean
        default: true
      publish_to_kaggle:
        description: '合并完成后发布到 Kaggle'
        required: false
        type: boolean
        default: true
      kaggle_dataset:
        description: 'Kaggle 数据集 slug'
        required: false
        type: string
        default: 'yhydev97/quant-data'
      version_notes:
        description: 'Kaggle 版本说明'
        required: false
        type: string
        default: 'Weekly kline data update'

jobs:
  download:
    runs-on: ubuntu-latest
    outputs:
      output_dir: ${{ steps.download.outputs.output_dir }}
      parquet_count: ${{ steps.download.outputs.parquet_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Binance Vision klines
        id: download
        env:
          FAPI_HTTP_PROXY: ${{ secrets.FAPI_HTTP_PROXY }}
          VISION_HTTP_PROXY: ${{ secrets.VISION_HTTP_PROXY }}
          SYMBOLS: ${{ github.event.inputs.symbols || '' }}
          INTERVAL: ${{ github.event.inputs.interval || '1h' }}
          START_MONTH: ${{ github.event.inputs.start_month || '' }}
          END_MONTH: ${{ github.event.inputs.end_month || '' }}
          MAX_WORKERS: ${{ github.event.inputs.max_workers || '8' }}
          SKIP_EXISTING: ${{ github.event.inputs.skip_existing != false && 'true' || 'false' }}
          OUTPUT_DIR: /tmp/binance-klines
        run: |
          python scripts/download_binance_vision.py
          echo "output_dir=/tmp/binance-klines" >> "$GITHUB_OUTPUT"
          echo "parquet_count=$(find /tmp/binance-klines -name '*.parquet' | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload klines artifact
        uses: actions/upload-artifact@v4
        with:
          name: binance-klines-parquet
          path: /tmp/binance-klines/**/*.parquet
          retention-days: 3

  merge-and-publish:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download klines artifact
        uses: actions/download-artifact@v4
        with:
          name: binance-klines-parquet
          path: /tmp/binance-klines

      - name: Merge, detect outliers, and publish to Kaggle
        env:
          INPUT_GLOB: '/tmp/binance-klines/**/*.parquet'
          OUTPUT_PATH: '/tmp/merged/klines.parquet'
          PUBLISH_TO_KAGGLE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_kaggle != false) || github.event_name == 'schedule' }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET: ${{ github.event.inputs.kaggle_dataset || 'yhydev97/quant-data' }}
          VERSION_NOTES: ${{ github.event.inputs.version_notes || 'Weekly kline data update' }}
          KAGGLE_STAGING_DIR: /tmp/kaggle-staging
          KAGGLE_DIR_MODE: zip
        run: python scripts/merge_parquet.py
