name: Publish Kaggle quant-data

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Make yhydev97/quant-data public
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail
          pip install -q kaggle
          rm -rf /tmp/metadata_dir
          mkdir -p /tmp/metadata_dir
          kaggle datasets metadata -d yhydev97/quant-data -p /tmp/metadata_dir
          META=/tmp/metadata_dir/dataset-metadata.json
          python3 - <<PY
          import json
          with open("$META") as f:
              meta = json.load(f)
          print("before:", {k: meta.get(k) for k in ("isPrivate", "title", "id")})
          meta["isPrivate"] = False
          with open("$META", "w") as f:
              json.dump(meta, f)
          print("after isPrivate:", meta.get("isPrivate"))
          PY
          echo "=== Push metadata update ==="
          kaggle datasets metadata -d yhydev97/quant-data -p /tmp/metadata_dir --update
          echo "=== Dataset status ==="
          kaggle datasets status -d yhydev97/quant-data || true

      - name: Export ephemeral Kaggle token artifact for Jupyter download
        if: always()
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p out
          printf '%s' "$KAGGLE_API_TOKEN" > out/kaggle_token

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kaggle-token
          path: out/kaggle_token
          retention-days: 1
